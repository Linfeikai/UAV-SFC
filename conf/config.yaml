# conf/config.yaml
defaults:
  - env: level2        
  - uav: embedded      
  - reward: balanced   
  - _self_             

# 1. 算法选择 (关键点)
algo_name: "SAC"  # 之后你可以通过命令行改为 "SAC", "MASKABLE_PPO" 等

# 2. 训练全局参数
total_timesteps: 500000
seed: 42
exp_name: "sfc_uav_diffusion_full_level2"  # 实验名称，用于区分不同实验的结果文件夹

# 3. 算法特定参数 (分类存放)
# 这样在 main.py 里可以直接拿 cfg.ppo 或 cfg.sac
ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  gamma: 0.99

sac:
  learning_rate: 0.0003
  buffer_size: 100000
  tau: 0.005

diffusion:
  learning_rate: 0.0001   # <--- 学习率降低到 1e-4，防止扩散模型崩盘
  buffer_size: 200000      
  batch_size: 256         # <--- 扩散模型喜欢大 Batch Size，显存够就上 256
  tau: 0.005
  qne_temperature: 1.0  # <--- QNE 的温度参数，控制探索程度，默认 1.0 可以先试试

# Hydra 运行配置

hydra:
  run:
    dir: ./experiments/${algo_name}/${exp_name}_${now:%m%d_%H%M%S}
  sweep:
    # 这是运行 python main.py -m 时生成的总目录
    dir: ./experiments/multirun/${now:%m%d_%H%M%S}
    # 这是每个子实验的文件夹名，根据参数动态生成
    subdir: crash${reward.CRASH}_succ${reward.SUCCESS}
  job:
    chdir: True